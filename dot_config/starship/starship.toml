format = """
[┌──────────────────────────────────────────────────────>](bold green)
[│](bold green)$directory$git_branch$git_status
[└─>](bold green)$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold cyan"
read_only = " 󰌾"
read_only_style = "red"

[git_branch]
symbol = " "
format = " on [$symbol$branch]($style)"
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead\]]($style) )'
style = "bold yellow"
ahead = "⇡${count}"
behind = "⇣${count}"
divergent = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "📦"
modified = "!${count}"
staged = '+${count}'
renamed = "»${count}"
deleted = "✘${count}"

[aws]
format = 'on [$symbol($profile )(\[$region\] )]($style)'
style = "bold yellow"
symbol = "☁️ "

[docker_context]
format = "via [$symbol$context]($style) "
style = "blue bold"

[python]
format = "via [${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\) )]($style)"
style = "yellow bold"
pyenv_version_name = false

[nodejs]
format = "via [$symbol($version )]($style)"
style = "bold green"

[rust]
format = "via [$symbol($version )]($style)"
style = "bold red"

[golang]
format = "via [$symbol($version )]($style)"
style = "bold cyan"

[java]
format = "via [$symbol($version )]($style)"
style = "red bold"

[cmd_duration]
min_time = 500
format = "took [$duration]($style) "
style = "bold yellow"

[line_break]
disabled = false

[sudo]
format = "as [$symbol]($style) "
style = "bold blue"
symbol = "sudo "
