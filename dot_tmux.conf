# Set prefix to Ctrl-a (like screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Mouse support
set -g mouse on

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Aggressive resize
set -g aggressive-resize on

# Don't rename windows automatically
set -g allow-rename off

# Longer history
set -g history-limit 50000

# Modern colors
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc"

# Status bar styling
set -g status-style bg=colour237,fg=colour255
set -g status-left "#[bg=colour239] #S #[bg=colour237] "
set -g status-right " #[fg=colour233,bg=colour241] %Y-%m-%d %H:%M "
set -g window-status-style "fg=colour244,bg=colour237"
set -g window-status-current-style "fg=colour255,bg=colour239"
set -g window-status-activity-style "fg=colour226"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Copy mode improvements
set -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
